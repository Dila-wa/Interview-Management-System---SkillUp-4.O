<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Interview Panel Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>HR Interview Dashboard</h1>
    <p>Panelists and allocated students overview</p>
  </header>

  <main class="container">
    <section class="card">
      <div class="card-header">
        <h2>Interview Day Overview</h2>
        <div class="actions">
          <button id="refreshBtn" class="btn">Sync Now</button>
        </div>
      </div>
      <p id="syncStatus" class="note">Live sync starting...</p>
      <div class="overview-layout">
        <div>
          <div id="summary" class="summary"></div>
          <div id="panelGrid" class="panel-grid"></div>
        </div>
        <aside class="side-card">
          <h3>Panel Overview</h3>
          <section class="side-section">
            <h4>Section 1: Ongoing + Next Be Ready</h4>
            <div id="ongoingReadyList" class="ready-list"></div>
          </section>
        </aside>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="data-service.js"></script>
  <script src="overview.js"></script>
</body>
</html>
